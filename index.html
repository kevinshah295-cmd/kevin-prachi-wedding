<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prachi & Kevin | Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --peacock: #0f3d3e;
  --peacock-deep: #082728;
  --peacock-light: #1f6f70;

  --saffron: #f4a300;
  --saffron-soft: #ffbe3b;

  --gold: #d4af37;

  --cream: #fff6e8;
  --cream-dim: rgba(255,246,232,0.7);

  --bg: #061a1b;
  --bg2: #0c2a2c;

  --border: rgba(212,175,55,0.25);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, var(--bg2), var(--bg));
  color: var(--cream);
  overflow-x: hidden;
}

/* BACKGROUND ORBS */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
}

.orb1 {
  width: 400px;
  height: 400px;
  background: rgba(15,61,62,0.5);
  top: -100px;
  left: -100px;
}

.orb2 {
  width: 400px;
  height: 400px;
  background: rgba(244,163,0,0.3);
  bottom: -120px;
  right: -120px;
}

/* TEXTURE */
.texture {
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.4;
  z-index: 0;
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 2;
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* HEADINGS */
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.2rem;
  margin-bottom: 10px;
  background: linear-gradient(90deg, var(--saffron), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--saffron);
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: rgba(12, 42, 44, 0.75);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 30px;
  margin: 30px 0;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: var(--gold);
}

/* DETAILS */
.details {
  font-size: 1.1rem;
  color: var(--cream-dim);
  line-height: 1.6;
}

/* DIVIDER */
.divider {
  width: 120px;
  height: 2px;
  margin: 30px auto;
  background: linear-gradient(to right, transparent, var(--saffron), transparent);
}

/* EVENTS */
.event {
  margin: 15px 0;
}

.mehendi { color: #3e8f5b; }
.haldi { color: #f4a300; }
.sangeet { color: #7c3aed; }
.wedding { color: var(--gold); }

/* BUTTON */
button {
  margin-top: 20px;
  background: linear-gradient(135deg, var(--saffron), var(--gold));
  color: #2b1b00;
  border: none;
  padding: 12px 28px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(244,163,0,0.5);
}

/* FOOTER */
.footer {
  margin-top: 40px;
  font-size: 0.9rem;
  color: var(--cream-dim);
}
</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="texture"></div>

<div class="container">

  <h1>Prachi & Kevin</h1>
  <h2>Save the Date</h2>

  <div class="card">
    <p class="details">
      Together with their families,<br>
      invite you to celebrate their wedding in<br>
      <strong>Vadodara, Gujarat</strong><br><br>
      <strong>13 & 14 December 2026</strong>
    </p>
  </div>

  <div class="divider"></div>

  <div class="card">
    <h2>Wedding Celebrations</h2>

    <div class="event mehendi">Mehendi</div>
    <div class="event haldi">Haldi</div>
    <div class="event sangeet">Sangeet</div>
    <div class="event wedding">Wedding Ceremony</div>

    <button>View Details</button>
  </div>

  <div class="footer">
    With love & celebration ✨
  </div>

</div>

</body>
</html>
